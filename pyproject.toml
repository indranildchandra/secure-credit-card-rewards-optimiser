# Tooling config for ruff (lint) and black (format).
# Run:  ruff check .   and   black .

[tool.black]
line-length = 88
target-version = ["py39", "py310", "py311"]

[tool.ruff]
line-length = 88
target-version = "py39"
exclude = [".adk_env", "db"]

[tool.ruff.lint]
# Default rules (pyflakes + a pragmatic subset of pycodestyle).
select = ["E4", "E7", "E9", "F"]
